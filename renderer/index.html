<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>MayiHear</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <span class="dot" id="status-dot"></span>
    <h1>MayiHear</h1>
  </header>

  <main>

    <!-- Record -->
    <div class="record-section">
      <div id="timer">00:00</div>

      <!-- Audio source toggles + level meters -->
      <div class="audio-sources">
        <div class="source-toggle">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-mic" checked />
            <span class="toggle-pill"></span>
            Micrófono
          </label>
          <div class="level-meter" id="meter-mic"><div class="level-bar" id="bar-mic"></div></div>
        </div>
        <div class="source-toggle">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-system" checked />
            <span class="toggle-pill"></span>
            Audio del sistema
          </label>
          <div class="level-meter" id="meter-system"><div class="level-bar" id="bar-system"></div></div>
        </div>
      </div>

      <button id="record-btn" title="Iniciar grabación">&#9679;</button>
      <span id="status-text">Listo para grabar</span>
    </div>

    <!-- Import transcription (always visible) -->
    <div class="import-section">
      <div class="import-header">
        <span class="section-label">Importar transcripcion</span>
        <div class="import-header-actions">
          <button class="copy-btn" id="load-txt-btn">Cargar .txt</button>
          <button class="copy-btn" id="clear-import-btn" style="display:none">Limpiar</button>
        </div>
      </div>
      <textarea id="import-textarea" placeholder="Pega aqui una transcripcion existente o carga un archivo .txt..." rows="3"></textarea>
      <button id="generate-from-text-btn" class="generate-btn" disabled>Generar Insights desde texto</button>
    </div>

    <!-- Project selector (always visible) -->
    <div class="context-section">
      <span class="section-label">Proyecto Monday.com</span>
      <select id="project-pre-select" class="monday-select" style="width:100%">
        <option value="">Cargando proyectos...</option>
      </select>
    </div>

    <!-- Context (always visible) -->
    <div class="context-section">
      <span class="section-label">Contexto de la reunión (opcional)</span>
      <textarea
        id="context-input"
        placeholder="ej. Reunión semanal de estado — Facultad de Ingeniería. Enfoque en riesgos de retención estudiantil y acciones de profesores."
        rows="2"
      ></textarea>
    </div>

    <!-- Transcript output -->
    <div class="output-section" id="transcript-section">
      <div class="output-header">
        <span class="section-label">Transcripción</span>
        <div class="output-header-actions">
          <button class="copy-btn" id="save-transcript">Guardar .txt</button>
          <button class="copy-btn" id="copy-transcript">Copiar</button>
          <button class="copy-btn" id="regenerate-btn" style="display:none">Regenerar</button>
        </div>
      </div>
      <div class="output-box" id="transcript-box"></div>
    </div>

    <!-- Insights output -->
    <div class="output-section" id="insights-section">
      <div class="output-header">
        <span class="section-label">Insights</span>
        <button class="copy-btn" id="copy-insights">Copiar</button>
      </div>
      <div class="output-box" id="insights-box"></div>
    </div>

    <!-- Acta button (appears after transcription) -->
    <div id="acta-actions" class="acta-actions" style="display:none">
      <button id="generate-acta-btn">Generar Acta de Reunión</button>
    </div>

    <!-- Acta output panel -->
    <div class="output-section" id="acta-section">
      <div class="output-header">
        <span class="section-label">Acta de Reunión</span>
        <button class="copy-btn" id="download-acta">Descargar .docx</button>
      </div>
      <div class="output-box" id="acta-box"></div>
    </div>

    <!-- Monday.com publish panel (shown after acta is generated) -->
    <div id="monday-section" class="monday-section" style="display:none">
      <div class="monday-header">
        <span class="section-label">Publicar en Monday.com</span>
        <span id="monday-status-text" class="monday-status-text"></span>
      </div>
      <div class="monday-controls">
        <div class="monday-row">
          <select id="monday-project-select" class="monday-select">
            <option value="">Cargando proyectos...</option>
          </select>
          <button id="monday-publish-btn" class="monday-btn" disabled>Publicar</button>
        </div>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
