# Microsoft 365 Agents Toolkit automation config
# Run these lifecycle stages via the Agents Toolkit VS Code extension sidebar.

version: 1.0.0

environmentFolderPath: .

provision:
  - uses: aadApp/create
    with:
      name: MayiHear
      generateClientSecret: true
      signInAudience: AzureADMyOrg
    writeToEnvironmentFile:
      clientId: BOT_ID
      clientSecretEnvName: BOT_PASSWORD
      objectId: AAD_APP_OBJECT_ID
      tenantId: AAD_APP_TENANT_ID

  - uses: botAadApp/create
    with:
      botId: ${{BOT_ID}}
      botPassword: ${{BOT_PASSWORD}}

  - uses: arm/deploy
    with:
      subscriptionId: ${{AZURE_SUBSCRIPTION_ID}}
      resourceGroupName: ${{AZURE_RESOURCE_GROUP_NAME}}
      templates:
        - path: infra/azure.bicep
          parameters: infra/azure.parameters.json
          deploymentName: mayihear-deploy

deploy:
  - uses: cli/runNpmCommand
    with:
      args: install

  - uses: azureAppService/zipDeploy
    with:
      artifactFolder: .
      resourceId: ${{AZURE_APP_SERVICE_RESOURCE_ID}}

publish:
  - uses: teamsApp/copyAppPackageToSPFx

  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
